<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Change Writing Lab Password</title>

  <link rel="icon" href="data:,">
</head>

<body>
  <main>
    <h1>Change Writing Lab Password</h1>

    <p id="password-page-introduction">
      New Writing Lab account holders must replace their
      temporary password before continuing.
    </p>

    <form id="change-password-form" hidden>
      <p>
        <label for="new-password">
          New password
        </label><br>

        <input
          id="new-password"
          type="password"
          autocomplete="new-password"
          minlength="12"
          required
        ><br>

        <small>
          Use at least 12 characters and do not reuse your
          HISD account password.
        </small>
      </p>

      <p>
        <label for="confirm-new-password">
          Confirm new password
        </label><br>

        <input
          id="confirm-new-password"
          type="password"
          autocomplete="new-password"
          minlength="12"
          required
        >
      </p>

      <button id="change-password-button" type="submit">
        Change password
      </button>
    </form>

    <p
      id="change-password-message"
      role="status"
      aria-live="polite"
    ></p>

    <p>
      <a href="admin.html">Administrator page</a>
      |
      <a href="consultant.html">Consultant page</a>
    </p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="change-password.js"></script>
</body>
</html>
